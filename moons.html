    <style>
/* ═══ PAGE-SPECIFIC OVERRIDES ═══ */
:root{
    --display:'Outfit',sans-serif;
    --body:'Space Grotesk',sans-serif;
    --mono:'JetBrains Mono',monospace;
    --black:#000;--s1:#0a0a10;--s2:#101018;--s3:#18182a;
    --white:#f0eee8;--t2:rgba(240,238,232,0.7);--t3:rgba(240,238,232,0.4);--t4:rgba(240,238,232,0.15);
    --gold:#c9a86c;
}

body{
    font-family:var(--body);background:var(--black);color:var(--white);
    overflow:hidden;height:100vh;
}

/* Override shared.css nav to match new design */
.nav{
    background:rgba(0,0,0,0.6)!important;
    backdrop-filter:saturate(180%) blur(20px)!important;
    -webkit-backdrop-filter:saturate(180%) blur(20px)!important;
    border-bottom:1px solid rgba(240,238,232,0.04)!important;
    height:56px;
}
.nav-logo{
    font-family:var(--mono)!important;font-size:13px!important;
    font-weight:500!important;color:var(--gold)!important;
    letter-spacing:0.08em!important;text-transform:uppercase!important;
}
.nav-links a{font-family:var(--body)!important;font-size:13px!important}
.mobile-menu{
    background:rgba(0,0,0,0.95)!important;
    backdrop-filter:blur(20px)!important;
    -webkit-backdrop-filter:blur(20px)!important;
}
.mobile-menu a{font-family:var(--body)!important}

/* ═══ CANVAS ═══ */
#orrery-canvas{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
}

/* ═══ SCENE TITLE ═══ */
.scene-title{
    position:fixed;top:72px;left:0;right:0;text-align:center;
    z-index:10;pointer-events:none;user-select:none;
}
.scene-title h1{
    font-family:var(--display);font-size:clamp(24px,4vw,40px);
    font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--white);
}
.scene-title p{
    font-family:var(--mono);font-size:12px;color:var(--t3);
    margin-top:6px;letter-spacing:0.1em;text-transform:uppercase;
}

/* ═══ SCROLL HINT ═══ */
.scroll-hint{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    z-index:10;pointer-events:none;
    font-family:var(--mono);font-size:11px;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--t4);
    animation:bob 2s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

/* ═══ INFO PANEL ═══ */
.info-panel{
    position:fixed;top:0;right:0;width:420px;height:100vh;z-index:50;
    background:rgba(10,10,16,0.92);
    backdrop-filter:saturate(180%) blur(32px);
    -webkit-backdrop-filter:saturate(180%) blur(32px);
    border-left:1px solid rgba(240,238,232,0.06);
    transform:translateX(100%);
    transition:transform 0.5s cubic-bezier(0.25,1,0.5,1);
    overflow-y:auto;padding:80px 32px 40px;
}
.info-panel.open{transform:none}

.info-panel-close{
    position:absolute;top:16px;right:16px;z-index:2;
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(240,238,232,0.08);background:rgba(240,238,232,0.04);
    color:var(--white);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.2s;
}
.info-panel-close:hover{background:rgba(240,238,232,0.1)}

.moon-header{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.moon-icon{
    width:52px;height:52px;border-radius:50%;flex-shrink:0;
    box-shadow:0 0 24px currentColor;
}
.moon-title{
    font-family:var(--display);font-size:26px;font-weight:800;
    letter-spacing:-0.02em;
}
.moon-order{
    font-family:var(--mono);font-size:11px;color:var(--t3);
    letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;
}

.info-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 0;border-bottom:1px solid rgba(240,238,232,0.04);
}
.info-label{font-family:var(--mono);font-size:12px;color:var(--t3);letter-spacing:0.04em}
.info-value{font-family:var(--body);font-size:14px;font-weight:600}

.phase-bar-wrap{margin:20px 0}
.phase-bar-bg{height:6px;border-radius:3px;background:rgba(240,238,232,0.06);overflow:hidden}
.phase-bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.phase-pct{
    text-align:right;font-family:var(--mono);font-size:11px;
    color:var(--t4);margin-top:6px;
}

.lore-text{
    margin-top:24px;padding-top:20px;
    border-top:1px solid rgba(240,238,232,0.04);
    font-family:var(--body);font-size:14px;color:var(--t2);
    line-height:1.7;font-style:italic;
}

/* ═══ MOON LEGEND (bottom left) ═══ */
.moon-legend{
    position:fixed;bottom:24px;left:24px;z-index:10;
    display:flex;flex-direction:column;gap:6px;
}
.legend-item{
    display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10px;letter-spacing:0.06em;
    color:var(--t3);text-transform:uppercase;
    cursor:pointer;transition:color 0.2s;
}
.legend-item:hover{color:var(--white)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
    .info-panel{
        top:auto;bottom:0;left:0;right:0;width:100%;height:75vh;
        border-left:none;border-top:1px solid rgba(240,238,232,0.06);
        border-radius:20px 20px 0 0;
        transform:translateY(100%);padding:24px 20px 40px;
    }
    .info-panel.open{transform:none}
    .moon-legend{display:none}
    .scene-title h1{font-size:20px}
}

@media(prefers-reduced-motion:reduce){
    *{animation-duration:0.01ms!important;transition-duration:0.1s!important}
}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MOONS = [
    { name:'Emberhowl', order:'Flame', color:'#ff6b2b', cycle:18, wizards:18, radius:4.5, inclination:0.1, size:0.35,
      lore:"Tied to the Flame Order. Its 18-day cycle matches its 18 Wizards. When full, Flame magic surges through the Forge Spire and volcanic energy peaks across the Ember Wastes." },
    { name:'Solaris', order:'Radiant', color:'#f0c030', cycle:12, wizards:12, radius:6.0, inclination:-0.15, size:0.32,
      lore:"Tied to the Radiant Order. Its 12-day cycle, the shortest of the Order moons, creates rapid power fluctuations. The Crystal Spires of Sunward Heights blaze brightest under a full Solaris." },
    { name:'Deepwell', order:'Deep', color:'#3b9eff', cycle:13, wizards:13, radius:7.5, inclination:0.2, size:0.33,
      lore:"Tied to the Deep Order. Its 13-day cycle governs prophecy and ocean magic. When full, Tidewatch Tower's waters rise and Deep Wizards see furthest into the future." },
    { name:'Evergreen', order:'Wild', color:'#45d95a', cycle:18, wizards:18, radius:9.0, inclination:-0.08, size:0.34,
      lore:"Tied to the Wild Order. Its 18-day cycle mirrors Emberhowl's, creating a fire-and-growth resonance. When full, the Heartwood tree grows visibly." },
    { name:'Umbra', order:'Arcane', color:'#9b6ff0', cycle:14, wizards:14, radius:10.5, inclination:0.25, size:0.3,
      lore:"Tied to the Arcane Order. Its 14-day cycle governs theoretical magic and dimensional research. When full, the Violet Citadel's archives glow with autonomous magical energy." },
    { name:'Roseglow', order:'Heart', color:'#e06bc0', cycle:11, wizards:11, radius:12.0, inclination:-0.18, size:0.31,
      lore:"Tied to the Heart Order. Its 11-day cycle, the fastest Order moon, creates the most frequent power surges. The Heartstring Tower resonates constantly." },
    { name:'Palehowl', order:'Starter', color:'#aaaaaa', cycle:30, wizards:0, radius:14.0, inclination:0.12, size:0.2,
      lore:"The smallest, dimmest moon. The seventh tone of the First Howl, carrying not power but possibility. It provides baseline magic to all non-wizard dogs. The Wanderer resonates with Palehowl." },
];

// Build legend
const legendEl = document.getElementById('moonLegend');
MOONS.forEach((m, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${m.color};box-shadow:0 0 6px ${m.color}80"></div>${m.name}`;
    item.addEventListener('click', () => {
        selectedMoon = m;
        showMoonInfo(m, performance.now() * 0.001);
    });
    legendEl.appendChild(item);
});

const isMobile = window.innerWidth < 768;
const canvas = document.getElementById('orrery-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.012);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(12, 8, 18);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 6;
controls.maxDistance = 50;
controls.maxPolarAngle = Math.PI * 0.85;
controls.target.set(0, 0, 0);

scene.add(new THREE.AmbientLight(0x222233, 0.5));
const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
sunLight.position.set(20, 15, 10);
scene.add(sunLight);

// Stars
const starCount = isMobile ? 1000 : 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 160;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true })));

// Pawtheon planet
const planetSegs = isMobile ? 32 : 48;
const planetGeo = new THREE.BoxGeometry(3.5, 3.5, 3.5, planetSegs, planetSegs, planetSegs);
{
    const pos = planetGeo.attributes.position;
    const v = new THREE.Vector3();
    for (let i = 0; i < pos.count; i++) {
        v.set(pos.getX(i), pos.getY(i), pos.getZ(i));
        const len = v.length();
        v.normalize().multiplyScalar(len * 0.85 + 1.75 * 0.15);
        pos.setXYZ(i, v.x, v.y, v.z);
    }
    pos.needsUpdate = true;
}

const realmRegions = [
    { name:'Frosthollow', theta:-0.6, phi:2.4, r:0.85,g:0.92,b:1.0, r2:0.6,g2:0.75,b2:0.95 },
    { name:'Abyssal Reaches', theta:0.0, phi:2.8, r:0.15,g:0.25,b:0.45, r2:0.1,g2:0.2,b2:0.4 },
    { name:'Sunward Heights', theta:0.6, phi:2.4, r:1.0,g:0.92,b:0.7, r2:0.95,g2:0.85,b2:0.6 },
    { name:'Ember Wastes', theta:0.8, phi:1.2, r:0.5,g:0.18,b:0.05, r2:0.3,g2:0.1,b2:0.02 },
    { name:'Deepwood', theta:0.4, phi:0.6, r:0.1,g:0.35,b:0.08, r2:0.15,g2:0.45,b2:0.12 },
    { name:'Violet Highlands', theta:-0.5, phi:0.8, r:0.4,g:0.22,b:0.5, r2:0.3,g2:0.18,b2:0.4 },
    { name:'Shadowmire', theta:0.0, phi:0.4, r:0.12,g:0.15,b:0.08, r2:0.08,g2:0.1,b2:0.05 },
    { name:'Starter Lands', theta:0.0, phi:1.57, r:0.35,g:0.5,b:0.3, r2:0.4,g2:0.55,b2:0.35 },
];

const colors = new Float32Array(planetGeo.attributes.position.count * 3);
const posArr = planetGeo.attributes.position.array;
const _v = new THREE.Vector3();

for (let i = 0; i < planetGeo.attributes.position.count; i++) {
    _v.set(posArr[i*3], posArr[i*3+1], posArr[i*3+2]).normalize();
    const theta = Math.atan2(_v.x, _v.z);
    const phi = Math.acos(_v.y);

    let totalW = 0, cr = 0, cg = 0, cb = 0;
    for (const realm of realmRegions) {
        const dTheta = theta - realm.theta;
        const dPhi = phi - realm.phi;
        const dist = Math.sqrt(dTheta * dTheta + dPhi * dPhi);
        const w = Math.pow(Math.max(0, 1 - dist / 1.8), 3);
        if (w > 0) {
            const t = Math.random() * 0.3;
            cr += (realm.r * (1-t) + realm.r2 * t) * w;
            cg += (realm.g * (1-t) + realm.g2 * t) * w;
            cb += (realm.b * (1-t) + realm.b2 * t) * w;
            totalW += w;
        }
    }

    if (totalW > 0) {
        colors[i*3] = cr / totalW; colors[i*3+1] = cg / totalW; colors[i*3+2] = cb / totalW;
    } else {
        const t = Math.random() * 0.2;
        colors[i*3] = 0.05 + t * 0.1; colors[i*3+1] = 0.15 + t * 0.15; colors[i*3+2] = 0.35 + t * 0.3;
    }

    if (totalW < 0.15) {
        const oceanT = Math.max(0, 1 - totalW / 0.15);
        colors[i*3] = colors[i*3] * (1-oceanT) + 0.06 * oceanT;
        colors[i*3+1] = colors[i*3+1] * (1-oceanT) + 0.18 * oceanT;
        colors[i*3+2] = colors[i*3+2] * (1-oceanT) + 0.45 * oceanT;
    }
}

// Topography
for (let i = 0; i < planetGeo.attributes.position.count; i++) {
    const px = posArr[i*3], py = posArr[i*3+1], pz = posArr[i*3+2];
    const n = _v.set(px, py, pz).normalize();

    const n1 = Math.sin(px * 4.3 + pz * 3.1) * Math.cos(py * 5.7) * 0.5;
    const n2 = Math.sin(px * 8.7 + py * 6.2) * Math.cos(pz * 9.1) * 0.25;
    const n3 = Math.sin(px * 15.3 + pz * 12.8) * 0.12;
    let height = n1 + n2 + n3;

    const theta = Math.atan2(n.x, n.z);
    const phi = Math.acos(n.y);

    const fhDist = Math.sqrt((theta+0.6)**2 + (phi-2.4)**2);
    if (fhDist < 1.2) height += Math.abs(height) * 1.5 * Math.max(0, 1-fhDist/1.2);

    const ewDist = Math.sqrt((theta-0.8)**2 + (phi-1.2)**2);
    if (ewDist < 1.0) height += Math.abs(Math.sin(px*12)*Math.cos(pz*10)) * 0.3 * Math.max(0, 1-ewDist/1.0);

    const vhDist = Math.sqrt((theta+0.5)**2 + (phi-0.8)**2);
    if (vhDist < 1.0) height = Math.round(height * 4) / 4 * 1.3;

    const smDist = Math.sqrt(theta**2 + (phi-0.4)**2);
    if (smDist < 0.8) height *= 0.3;

    if (colors[i*3+2] > 0.35 && colors[i*3] < 0.1) height *= 0.15;

    const displacement = height * 0.18;
    posArr[i*3] += n.x * displacement;
    posArr[i*3+1] += n.y * displacement;
    posArr[i*3+2] += n.z * displacement;
}
planetGeo.attributes.position.needsUpdate = true;
planetGeo.computeVertexNormals();
planetGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const planet = new THREE.Mesh(planetGeo, new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.7, metalness: 0.1, flatShading: true
}));
scene.add(planet);

// Orbit rings
MOONS.forEach(m => {
    const pts = [];
    for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        pts.push(new THREE.Vector3(
            Math.cos(a) * m.radius,
            Math.sin(m.inclination) * Math.sin(a) * m.radius * 0.15,
            Math.sin(a) * m.radius
        ));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineDashedMaterial({ color: new THREE.Color(m.color), opacity: 0.12, transparent: true, dashSize: 0.5, gapSize: 0.3 });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    scene.add(line);
});

// Moon objects
const moonSegs = isMobile ? 16 : 24;
const baseSpeed = 0.3;
const moonGroups = [];
const moonMeshes = [];
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

MOONS.forEach((m, idx) => {
    const group = new THREE.Group();
    const col = new THREE.Color(m.color);
    const moonGeo = new THREE.SphereGeometry(m.size, moonSegs, moonSegs);
    const moonMat = new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.6, roughness: 0.5, metalness: 0.2 });
    const moonMesh = new THREE.Mesh(moonGeo, moonMat);
    moonMesh.userData = { moonIndex: idx };
    group.add(moonMesh);

    // Hit target
    const hitGeo = new THREE.SphereGeometry(m.size * 3, 8, 8);
    const hitMesh = new THREE.Mesh(hitGeo, new THREE.MeshBasicMaterial({ visible: false }));
    hitMesh.userData = { moonIndex: idx };
    moonMesh.add(hitMesh);
    moonMeshes.push(hitMesh);

    // Phase shadow
    const shadowGeo = new THREE.SphereGeometry(m.size + 0.005, moonSegs, moonSegs, 0, Math.PI);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0.85, transparent: true, side: THREE.DoubleSide });
    const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
    moonMesh.add(shadowMesh);
    m._shadow = shadowMesh;

    // Glow
    const spriteMat = new THREE.SpriteMaterial({
        map: createGlowTexture(m.color),
        transparent: true, opacity: 0.4, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(m.size * 4, m.size * 4, 1);
    moonMesh.add(sprite);
    m._glowSprite = sprite;

    // Label
    const labelSprite = createTextSprite(m.name, m.color);
    labelSprite.position.set(0, m.size + 0.4, 0);
    labelSprite.scale.set(1.6, 0.4, 1);
    moonMesh.add(labelSprite);

    group.userData = { moon: m, speed: baseSpeed / m.cycle, angle: (idx / MOONS.length) * Math.PI * 2 };
    scene.add(group);
    moonGroups.push(group);
    m._mesh = moonMesh;
});

function createGlowTexture(hexColor) {
    const size = 128;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    grad.addColorStop(0, hexColor + 'aa');
    grad.addColorStop(0.4, hexColor + '44');
    grad.addColorStop(1, hexColor + '00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(c);
}

function createTextSprite(text, color) {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.font = '500 24px "Space Grotesk", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = color;
    ctx.fillText(text, 128, 32);
    return new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
}

// Phase helpers
const PHASE_NAMES = ['New','Waxing Crescent','First Quarter','Waxing Gibbous','Full','Waning Gibbous','Third Quarter','Waning Crescent'];
function getPhase(time, cycle) { return ((time * 0.05) % cycle) / cycle; }
function getPhaseName(p) { return PHASE_NAMES[Math.floor(p * 8) % 8]; }
function getMagicPower(p) {
    const f = 1 - Math.abs(p - 0.5) * 2;
    if (f > 0.8) return 'Surging';
    if (f > 0.5) return 'Strong';
    if (f > 0.2) return 'Dim';
    return 'Dormant';
}

// Info panel
const infoPanel = document.getElementById('infoPanel');
const infoPanelContent = document.getElementById('infoPanelContent');
document.getElementById('infoPanelClose').addEventListener('click', () => infoPanel.classList.remove('open'));

let selectedMoon = null;

function showMoonInfo(m, time) {
    const p = getPhase(time, m.cycle);
    const fullness = 1 - Math.abs(p - 0.5) * 2;
    const pct = Math.round(fullness * 100);
    infoPanelContent.innerHTML = `
        <div class="moon-header">
            <div class="moon-icon" style="background:${m.color};box-shadow:0 0 28px ${m.color}88"></div>
            <div>
                <div class="moon-title" style="color:${m.color}">${m.name}</div>
                <div class="moon-order">${m.order} Order · ${m.cycle}-day cycle</div>
            </div>
        </div>
        <div class="info-row"><span class="info-label">Phase</span><span class="info-value">${getPhaseName(p)}</span></div>
        <div class="phase-bar-wrap">
            <div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${pct}%;background:${m.color};box-shadow:0 0 8px ${m.color}88"></div></div>
            <div class="phase-pct">${pct}% illuminated</div>
        </div>
        <div class="info-row"><span class="info-label">Magic Power</span><span class="info-value" style="color:${m.color}">${getMagicPower(p)}</span></div>
        <div class="info-row"><span class="info-label">Wizards</span><span class="info-value">${m.wizards}</span></div>
        <div class="lore-text">"${m.lore}"</div>
    `;
    infoPanel.classList.add('open');
}

// Interaction
let _downX = 0, _downY = 0;
window.addEventListener('pointermove', e => {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
});
window.addEventListener('pointerdown', e => { _downX = e.clientX; _downY = e.clientY; });
window.addEventListener('pointerup', e => {
    if (Math.abs(e.clientX - _downX) > 15 || Math.abs(e.clientY - _downY) > 15) return;
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(moonMeshes);
    if (hits.length > 0) {
        const m = MOONS[hits[0].object.userData.moonIndex];
        selectedMoon = m;
        showMoonInfo(m, performance.now() * 0.001);
    }
});

// Close panel on Escape
document.addEventListener('keydown', e => { if(e.key === 'Escape') infoPanel.classList.remove('open') });

// Animation loop
let tabVisible = true;
document.addEventListener('visibilitychange', () => { tabVisible = !document.hidden; });

function animate() {
    requestAnimationFrame(animate);
    if (!tabVisible) return;
    const t = performance.now() * 0.001;

    planet.rotation.y = t * 0.15;
    planet.rotation.x = Math.sin(t * 0.03) * 0.1;

    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(moonMeshes);
    const hitIdx = hits.length > 0 ? hits[0].object.userData.moonIndex : -1;

    moonGroups.forEach((g, i) => {
        const m = MOONS[i];
        const d = g.userData;
        d.angle += d.speed * 0.016;

        const x = Math.cos(d.angle) * m.radius;
        const z = Math.sin(d.angle) * m.radius;
        const y = Math.sin(m.inclination) * Math.sin(d.angle) * m.radius * 0.15;
        m._mesh.position.set(x, y, z);

        const phase = getPhase(t, m.cycle);
        m._shadow.rotation.y = phase * Math.PI * 2;

        const isHovered = hitIdx === i;
        const targetScale = isHovered ? 1.25 : 1.0;
        const cs = m._mesh.scale.x;
        m._mesh.scale.setScalar(cs + (targetScale - cs) * 0.1);
        m._glowSprite.material.opacity = isHovered ? 0.7 : 0.35;
        canvas.style.cursor = isHovered ? 'pointer' : 'default';
    });

    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
